openapi: 3.0.3
info:
  title: GrantLayer MVP API
  description: |
    GrantLayer MVP — API Contract Baseline (GL-203B).

    **Status: Developer Preview / Controlled Preview with strict boundaries.**
    This is not a production SaaS. Not ready for real customer data, private
    grant data, or institutional data. Tenant/workspace isolation baseline is
    implemented but not production-complete. No official SDK/package is claimed
    or published.

    This document describes the HTTP surface as of GL-203B, aligned with the
    actual implementation after GL-200 through GL-203.

    **Auth modes:**
    - Legacy mode (`ENABLE_OPERATOR_MODEL=false`): `Authorization: Bearer <admin-token>`
      via constant-time HMAC comparison. Tenant context is bound to `"demo"`.
    - Operator mode (`ENABLE_OPERATOR_MODEL=true`): `Authorization: Bearer <operator-token>`
      via PBKDF2-HMAC-SHA256 (600,000 iterations). Tenant context is derived
      server-side from the authenticated operator record.

    **Tenant context:**
    `tenant_id` is always derived server-side from authentication. Clients cannot
    supply or override `tenant_id` via headers, path parameters, or request bodies.
    Cross-tenant ID lookups return HTTP 404; cross-tenant list endpoints return
    an empty list. No existence of cross-tenant resources is leaked.

    **workspace_id:**
    `workspace_id` is reserved, nullable, and not currently enforced. It is present
    in the data model but workspace-level isolation is deferred to a future release.

    **Correlation ID:**
    Clients may send `X-Correlation-ID` (or `X-Request-ID` as fallback) on any
    request. The server echoes or generates a safe correlation ID in the
    `X-Correlation-ID` response header.

    **Security headers:**
    All responses include: `X-Content-Type-Options: nosniff`, `X-Frame-Options: DENY`,
    `Cache-Control: no-store`, `Content-Security-Policy`.

    **Production-mode startup:**
    In `staging` or `production` runtime mode, placeholder/weak admin tokens are
    rejected at startup and the server will not start (GL-201 fail-closed behavior).

    **Error contract:**
    All error responses follow the GL-030 additive shape:
    ```json
    {
      "error": "human-readable summary",
      "errorCode": "machine-readable-code",
      "reason": "detailed explanation"
    }
    ```

    **Backward compatibility note:**
    Grant responses include both snake_case and camelCase signature fields
    (`signing_key_id`/`signingKeyId`, `payload_hash`/`payloadHash`) for
    backward compatibility.

    Security-sensitive reports must be routed to GitHub Security Advisories.
  version: "0.203b.0-developer-preview"

servers:
  - url: http://localhost:8765
    description: Local development server

paths:
  /health:
    get:
      summary: Liveness health check
      description: |
        Liveness endpoint. Confirms the API process can respond.
        Does NOT expose secrets, raw environment, or internal config.
        GL-077 baseline response.
      operationId: healthCheck
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                required: [status, service, checkType]
                properties:
                  status: { type: string, example: "ok" }
                  service: { type: string, example: "grantlayer" }
                  checkType: { type: string, example: "liveness" }

  /readiness:
    get:
      summary: Readiness check
      description: |
        Readiness endpoint. Confirms the API can resolve runtime
        configuration using the GL-076 runtime_config helper.
        Does NOT expose raw environment values, secrets, or tokens.
      operationId: readinessCheck
      responses:
        "200":
          description: Runtime configuration valid and ready
          content:
            application/json:
              schema:
                type: object
                required: [status, service, checkType, runtimeMode, isProductionLike]
                properties:
                  status: { type: string, example: "ready" }
                  service: { type: string, example: "grantlayer" }
                  checkType: { type: string, example: "readiness" }
                  runtimeMode: { type: string, example: "local" }
                  isProductionLike: { type: boolean, example: false }
        "503":
          description: Runtime configuration invalid
          content:
            application/json:
              schema:
                type: object
                required: [status, service, checkType, errorCode]
                properties:
                  status: { type: string, example: "not_ready" }
                  service: { type: string, example: "grantlayer" }
                  checkType: { type: string, example: "readiness" }
                  errorCode: { type: string, example: "RUNTIME_CONFIG_INVALID" }

  /:
    get:
      summary: Dashboard
      description: Serves the HTML dashboard. Falls back to 404 if the dashboard file is missing.
      operationId: getDashboard
      responses:
        "200":
          description: HTML dashboard
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Dashboard not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grants:
    get:
      summary: List grants
      description: Returns all grants with signature metadata.
      operationId: listGrants
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: List of grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grant"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create grant
      description: Create a new grant. In operator mode, the operator ID is used as `createdBy`.
      operationId: createGrant
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, role, action, resource, validFrom, validUntil, createdBy, reason]
              properties:
                subjectId: { type: string }
                role: { type: string }
                action: { type: string }
                resource: { type: string }
                validFrom: { type: string, format: date-time }
                validUntil: { type: string, format: date-time }
                createdBy: { type: string }
                reason: { type: string }
                maxUses: { type: integer, nullable: true }
      responses:
        "201":
          description: Grant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "400":
          description: Invalid JSON or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grants/{id}:
    get:
      summary: Get grant by ID
      description: Returns a single grant with signature metadata.
      operationId: getGrant
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Grant found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grants/{id}/revoke:
    post:
      summary: Revoke grant
      description: Revoke an active grant.
      operationId: revokeGrant
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [revokedBy, reason]
              properties:
                revokedBy: { type: string }
                reason: { type: string }
      responses:
        "200":
          description: Grant revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok, grantId]
                properties:
                  ok: { type: boolean }
                  grantId: { type: string }
        "400":
          description: Invalid JSON or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Grant already revoked or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grant-requests:
    get:
      summary: List grant requests
      description: |
        Returns all grant requests, optionally filtered by status.
        Tenant context is server-derived from authentication; clients cannot
        supply or override it. Cross-tenant requests return an empty list.
        Grant requests only carry meaningful data when operator model is enabled.
      operationId: listGrantRequests
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [requested, approved, denied, revoked, expired] }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: List of grant requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrantRequest"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create grant request
      description: Create a new grant request in `requested` state. Operator mode only.
      operationId: createGrantRequest
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, role, action, resource, validFrom, validUntil, reason]
              properties:
                subjectId: { type: string }
                role: { type: string }
                action: { type: string }
                resource: { type: string }
                validFrom: { type: string, format: date-time }
                validUntil: { type: string, format: date-time }
                reason: { type: string }
      responses:
        "201":
          description: Grant request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantRequest"
        "400":
          description: Invalid JSON or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grant-requests/{id}:
    get:
      summary: Get grant request by ID
      description: Returns a single grant request. Operator mode only.
      operationId: getGrantRequest
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - OperatorToken: []
      responses:
        "200":
          description: Grant request found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantRequest"
        "404":
          description: Grant request not found or operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grant-requests/{id}/approve:
    post:
      summary: Approve grant request
      description: Approve a grant request and create the associated grant. Operator mode only.
      operationId: approveGrantRequest
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - OperatorToken: []
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                required: [ok, request, grant]
                properties:
                  ok: { type: boolean }
                  request:
                    $ref: "#/components/schemas/GrantRequest"
                  grant:
                    $ref: "#/components/schemas/Grant"
        "400":
          description: Invalid state or request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed or self-approval blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grant request not found or operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grant-requests/{id}/deny:
    post:
      summary: Deny grant request
      description: Deny a grant request without creating a grant. Operator mode only.
      operationId: denyGrantRequest
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Request denied
          content:
            application/json:
              schema:
                type: object
                required: [ok, request]
                properties:
                  ok: { type: boolean }
                  request:
                    $ref: "#/components/schemas/GrantRequest"
        "400":
          description: Invalid JSON, missing reason, or invalid state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grant request not found or operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grant-executions:
    get:
      summary: List grant executions
      description: Returns all grant executions, optionally filtered. Operator mode only.
      operationId: listGrantExecutions
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 200 }
        - name: grantId
          in: query
          required: false
          schema: { type: string }
        - name: operatorId
          in: query
          required: false
          schema: { type: string }
      security:
        - OperatorToken: []
      responses:
        "200":
          description: List of grant executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrantExecution"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grant-executions/{id}:
    get:
      summary: Get grant execution by ID
      description: Returns a single grant execution. Operator mode only.
      operationId: getGrantExecution
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - OperatorToken: []
      responses:
        "200":
          description: Grant execution found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantExecution"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grant execution not found or operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/grants/{id}/executions:
    get:
      summary: List executions for a grant
      description: Returns all executions linked to a specific grant. Operator mode only.
      operationId: listExecutionsForGrant
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 200 }
      security:
        - OperatorToken: []
      responses:
        "200":
          description: List of grant executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrantExecution"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grant not found or operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/audit-events:
    get:
      summary: List audit events
      description: Returns audit events ordered by timestamp descending.
      operationId: listAuditEvents
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 200 }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: List of audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/challenges:
    get:
      summary: List challenges
      description: Returns all challenges ordered by creation time descending.
      operationId: listChallenges
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: List of challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Challenge"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create challenge
      description: Create a new challenge for a subject-action-resource tuple.
      operationId: createChallenge
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, action, resource]
              properties:
                subjectId: { type: string }
                action: { type: string }
                resource: { type: string }
      responses:
        "201":
          description: Challenge created
          content:
            application/json:
              schema:
                type: object
                required: [challengeId, subjectId, action, resource, expiresAt]
                properties:
                  challengeId: { type: string }
                  subjectId: { type: string }
                  action: { type: string }
                  resource: { type: string }
                  expiresAt: { type: string }
        "400":
          description: Invalid JSON or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/operators/me:
    get:
      summary: Get current operator profile
      description: |
        Returns the authenticated operator's own profile. Operator mode only;
        returns 404 if operator model is disabled. The `tenantId` field reflects
        the server-derived tenant context for this operator.
      operationId: getOperatorMe
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Operator profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  operatorId: { type: string }
                  name: { type: string }
                  role: { type: string }
                  active: { type: boolean }
                  tenantId: { type: string, description: "Server-derived tenant context for this operator. Not client-supplied." }
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Operator model disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/evidence/executions/{id}:
    get:
      summary: Get evidence bundle for execution
      description: |
        Returns a complete evidence bundle for a single GrantExecution.
        Authorization: owner, grant_admin, auditor (operator mode) or admin token (legacy mode).
      operationId: getEvidenceBundle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Evidence bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceBundle"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/evidence/executions/{id}/export:
    get:
      summary: Export evidence bundle artifact
      description: |
        Returns a deterministic, pretty-printed JSON artifact for download.

        Response headers:
        - `Content-Type: application/json; charset=utf-8`
        - `Content-Disposition: attachment; filename="evidence-{id}-{shortHash}.json"`
        - `X-Evidence-Hash: {fullEvidenceHash}`

        Authorization: owner, grant_admin, auditor (operator mode) or admin token (legacy mode).
      operationId: exportEvidenceBundle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Evidence bundle artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceBundle"
          headers:
            Content-Disposition:
              description: Attachment filename for the evidence bundle
              schema: { type: string }
            X-Evidence-Hash:
              description: SHA-256 evidence hash
              schema: { type: string }
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/evidence/executions/{id}/verify:
    get:
      summary: Verify evidence bundle for execution
      description: |
        Verifies the persisted evidence bundle for a GrantExecution.
        Recomputes the SHA-256 evidenceHash, validates structural completeness
        and denial-code consistency, and records the result.

        Status values:
        - `valid` — bundle hash matches and structure is consistent
        - `invalid` — hash mismatch or structural/consistency failure
        - `missing_data` — no persisted bundle found for execution
        - `unsupported_version` — unsupported canonicalVersion or hashAlgorithm

        Authorization: owner, grant_admin, auditor (operator mode) or admin token (legacy mode).
      operationId: verifyEvidenceBundle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
