        "404":
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auditor/exports/build:
    post:
      summary: Build institutional auditor export
      description: |
        Builds an institutional auditor export from structured inputs.
        Authorization: owner, grant_admin, auditor (operator mode) or admin token (legacy mode).
      operationId: buildAuditorExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                exportId: { type: string, nullable: true }
                exportType: { type: string, nullable: true }
                subjectId: { type: string, nullable: true }
                decisionId: { type: string, nullable: true }
                generatedBy: { type: string, nullable: true }
                auditorId: { type: string, nullable: true }
                decisionProvenance: { type: object, nullable: true }
                auditorReport: { type: object, nullable: true }
                evidenceCompleteness: { type: object, nullable: true }
                complianceGapReport: { type: object, nullable: true }
                permissionResult: { type: object, nullable: true }
                approvalRequirement: { type: object, nullable: true }
                approvalLifecycle: { type: object, nullable: true }
                policyResults: { type: array, items: { type: object }, nullable: true }
                metadata: { type: object, nullable: true }
                context: { type: object, nullable: true }
                createdAt: { type: string, nullable: true }
                includeDetails: { type: boolean, default: true }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Auditor export result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstitutionalAuditorExport"
        "400":
          description: Validation error or invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/policy-requirements/evaluate:
    post:
      summary: Evaluate policy requirements
      description: |
        Evaluates a policy requirement rule pack against subject and context.
        Authorization: owner, grant_admin, auditor (operator mode) or admin token (legacy mode).
      operationId: evaluatePolicyRequirements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyPack: { type: object, nullable: true }
                subject: { type: object, nullable: true }
                evidenceCompleteness: { type: object, nullable: true }
                complianceGapReport: { type: object, nullable: true }
                permissionResult: { type: object, nullable: true }
                approvalRequirement: { type: object, nullable: true }
                approvalLifecycle: { type: object, nullable: true }
                decisionProvenance: { type: object, nullable: true }
                context: { type: object, nullable: true }
                createdAt: { type: string, nullable: true }
                includeDetails: { type: boolean, default: true }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Policy requirement evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyRequirementEvaluation"
        "400":
          description: Validation error or invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/compliance/readiness/build:
    post:
      summary: Build compliance readiness summary
      description: |
        Builds a compliance readiness summary from structured GrantLayer signals.
        Authorization: owner, grant_admin, auditor (operator mode) or admin token (legacy mode).
      operationId: buildComplianceReadiness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subjectId: { type: string, nullable: true }
                workflowId: { type: string, nullable: true }
                evidenceCompleteness: { type: object, nullable: true }
                complianceGapReport: { type: object, nullable: true }
                permissionResult: { type: object, nullable: true }
                approvalRequirement: { type: object, nullable: true }
                approvalLifecycle: { type: object, nullable: true }
                decisionProvenance: { type: object, nullable: true }
                auditorExport: { type: object, nullable: true }
                policyRequirementEvaluation: { type: object, nullable: true }
                context: { type: object, nullable: true }
                createdAt: { type: string, nullable: true }
                includeDetails: { type: boolean, default: true }
      security:
        - LegacyAdminToken: []
        - OperatorToken: []
      responses:
        "200":
          description: Compliance readiness summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceReadinessSummary"
        "400":
          description: Validation error or invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    LegacyAdminToken:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Legacy admin token mode. Send `Authorization: Bearer <admin-token>`.
        Used when `ENABLE_OPERATOR_MODEL=false`. Validated via constant-time
        HMAC comparison (GL-201). Tenant context is bound to `"demo"` server-side.
        Clients cannot supply or override tenant_id. In production-like runtime
        mode, placeholder/weak tokens are rejected at startup.
    OperatorToken:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Operator bearer token mode. Send `Authorization: Bearer <operator-token>`.
        Used when `ENABLE_OPERATOR_MODEL=true`. Validated via PBKDF2-HMAC-SHA256
        (600,000 iterations) with SHA-256 lookup-hash pre-filter. Tenant context
        is derived server-side from the authenticated operator record. Clients
        cannot supply or override tenant_id. Tokens are issued once at operator
        creation and are not retrievable afterward.

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error summary
        errorCode:
          type: string
          description: Machine-readable error code (GL-030 additive field)
        reason:
          type: string
          description: Detailed explanation (GL-030 additive field)
      example:
        error: "Grant execution not found"
        errorCode: "grant_execution_not_found"
        reason: "The requested grant execution does not exist."

    Grant:
      type: object
      properties:
        id: { type: string }
        subject_id: { type: string }
        role: { type: string }
        action: { type: string }
        resource: { type: string }
        valid_from: { type: string }
        valid_until: { type: string }
        created_by: { type: string }
        reason: { type: string }
        created_at: { type: string }
        revoked: { type: boolean }
        revoked_by: { type: string, nullable: true }
        revoked_reason: { type: string, nullable: true }
        revoked_at: { type: string, nullable: true }
        signature: { type: string, nullable: true }
        signing_key_id: { type: string, nullable: true }
        payload_hash: { type: string, nullable: true }
        # camelCase duplicates injected by server for backward compatibility
        signingKeyId: { type: string, nullable: true }
        payloadHash: { type: string, nullable: true }
        max_uses: { type: integer, nullable: true }
        use_count: { type: integer }
        signaturePresent: { type: boolean }
        signatureValid: { type: boolean }

    GrantRequest:
      type: object
      properties:
        id: { type: string }
        subject_id: { type: string }
        role: { type: string }
        action: { type: string }
        resource: { type: string }
        valid_from: { type: string }
        valid_until: { type: string }
        requested_by: { type: string }
        reason: { type: string }
        status: { type: string, enum: [requested, approved, denied, revoked, expired] }
        approved_by: { type: string, nullable: true }
        approved_at: { type: string, nullable: true }
        denied_by: { type: string, nullable: true }
        denied_at: { type: string, nullable: true }
        denial_reason: { type: string, nullable: true }
        revoked_by: { type: string, nullable: true }
        revoked_at: { type: string, nullable: true }
        revoked_reason: { type: string, nullable: true }
        grant_id: { type: string, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }

    GrantExecution:
      type: object
      properties:
        id: { type: string }
        grantId: { type: string, nullable: true }
        grantRequestId: { type: string, nullable: true }
        operatorId: { type: string, nullable: true }
        action: { type: string }
        resource: { type: string }
        challengeId: { type: string, nullable: true }
        challengeResult: { type: string }
        policyResult: { type: string }
        result: { type: string, enum: [succeeded, denied, failed] }
        errorCode: { type: string, nullable: true }
        executedAt: { type: string }
        auditEventId: { type: string, nullable: true }
        metadataJson: { type: string, nullable: true }

    AuditEvent:
      type: object
      properties:
        id: { type: string }
        timestamp: { type: string }
        subject_id: { type: string }
        role: { type: string }
        action: { type: string }
        resource: { type: string }
        approved: { type: boolean }
        reason: { type: string }
        matched_grant_id: { type: string, nullable: true }
        challenge_id: { type: string, nullable: true }
        challenge_present: { type: boolean }
        challenge_result: { type: string }
        grant_signature_result: { type: string }
        row_hash: { type: string, nullable: true, description: "SHA-256 hash of this audit event row for tamper-evidence chain (GL-103)." }
        prev_hash: { type: string, nullable: true, description: "Hash of the previous audit event, forming the tamper-evidence chain." }
        tenant_id: { type: string, nullable: true, description: "Server-derived tenant context. Null for pre-migration or system-scope events (GL-200B)." }
        workspace_id: { type: string, nullable: true, description: "Reserved, nullable. workspace_id enforcement is deferred." }
        scope: { type: string, nullable: true, description: "Audit event scope: tenant, tenant_admin, system, or public." }

    Challenge:
      type: object
      properties:
        id: { type: string }
        subject_id: { type: string }
        action: { type: string }
        resource: { type: string }
        created_at: { type: string }
        expires_at: { type: string }
        used_at: { type: string, nullable: true }
        status: { type: string, enum: [active, used, expired] }

    EvidenceBundle:
      type: object
      required:
        - evidenceId
        - executionId
        - grantId
        - grantRequestId
        - evidenceHash
        - canonicalVersion
        - hashAlgorithm
        - generatedAt
        - request
        - approval
        - grant
        - execution
        - usageLimits
        - auditTrail
      properties:
        evidenceId:
          type: string
          description: Same as executionId
        executionId:
          type: string
        grantId:
          type: string
          nullable: true
          description: Linked grant ID, or null if no grant matched
        grantRequestId:
          type: string
          nullable: true
          description: Linked grant request ID, or null if not applicable
        evidenceHash:
          type: string
          description: SHA-256 hash of the canonical bundle (GL-026)
        canonicalVersion:
          type: string
          enum: [gl-evidence-v1]
        hashAlgorithm:
          type: string
          enum: [sha256]
        generatedAt:
          type: string
          format: date-time
        request:
          type: object
          nullable: true
          description: Grant request section (present if grant request exists)
          properties:
            id: { type: string }
            requestedBy: { type: string }
            requestedAt: { type: string }
            reason: { type: string }
        approval:
          type: object
          nullable: true
          description: Approval/denial section (present if request was approved or denied)
          properties:
            approvedBy: { type: string, nullable: true }
            approvedAt: { type: string, nullable: true }
            deniedBy: { type: string, nullable: true }
            deniedAt: { type: string, nullable: true }
            denialReason: { type: string, nullable: true }
        grant:
          type: object
          nullable: true
          description: Grant section (present if a grant was matched)
          properties:
            id: { type: string }
            subjectId: { type: string }
            role: { type: string }
            action: { type: string }
            resource: { type: string }
            validFrom: { type: string }
            validUntil: { type: string }
            createdBy: { type: string }
            createdAt: { type: string }
            signingKeyId: { type: string, nullable: true }
            payloadHash: { type: string, nullable: true }
            maxUses: { type: integer, nullable: true }
            useCount: { type: integer }
            grantSignatureResult: { type: string }
        execution:
          type: object
          description: Execution section
          properties:
            action: { type: string }
            resource: { type: string }
            operatorId: { type: string, nullable: true }
            challengeId: { type: string, nullable: true }
            challengeResult: { type: string }
            policyResult: { type: string }
            result: { type: string, enum: [succeeded, denied, failed] }
            errorCode: { type: string, nullable: true }
            executedAt: { type: string }
            auditEventId: { type: string, nullable: true }
        usageLimits:
          type: object
          description: Usage limit snapshot at time of execution
          properties:
            affectedOutcome: { type: boolean }
            maxUses: { type: integer, nullable: true }
            useCount: { type: integer, nullable: true }
            reason: { type: string, nullable: true }
        auditTrail:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"

    DemoActionResult:
      type: object
      properties:
        approved: { type: boolean }
        message: { type: string, nullable: true }
        reason: { type: string, nullable: true }
        matchedGrantId: { type: string, nullable: true }
        challengeId: { type: string, nullable: true }
        challengeResult: { type: string, nullable: true }
        auditEventId: { type: string }
        grantSignatureResult: { type: string }
        executionId: { type: string }

    EvidenceVerificationResult:
      type: object
      required: [status, executionId, verifiedAt, reason]
      properties:
        status:
          type: string
          enum: [valid, invalid, missing_data, unsupported_version]
          description: Verification outcome for the persisted evidence bundle.
        executionId:
          type: string
          description: The execution ID that was verified.
        verifiedAt:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp of the verification.
        reason:
          type: string
          description: Human-readable explanation of the verification outcome.

    DecisionProvenanceSummary:
      type: object
      required:
        - executionId
        - grantId
        - execution
        - evidence
        - verification
        - provenanceEvents
        - timeline
        - warnings
        - generatedAt
      properties:
        executionId:
          type: string
        grantId:
          type: string
          nullable: true
        execution:
          type: object
          nullable: true
          properties:
            id: { type: string }
            action: { type: string }
            resource: { type: string }
            operatorId: { type: string, nullable: true }
            grantId: { type: string, nullable: true }
            grantRequestId: { type: string, nullable: true }
            challengeId: { type: string, nullable: true }
            challengeResult: { type: string }
            policyResult: { type: string }
            result: { type: string }
            errorCode: { type: string, nullable: true }
            executedAt: { type: string }
            auditEventId: { type: string, nullable: true }
        evidence:
          type: object
          properties:
            present: { type: boolean }
            hash:
              type: string
              nullable: true
            bundleJson:
              type: object
              nullable: true
        verification:
          type: object
          properties:
            status:
              type: string
              nullable: true
            verifiedAt:
              type: string
              nullable: true
        provenanceEvents:
          type: array
          items:
            type: object
            properties:
              eventType: { type: string }
              actorType: { type: string }
              actorId: { type: string }
              action: { type: string }
              occurredAt: { type: string }
              resourceType: { type: string }
              resourceId: { type: string }
              evidenceHash: { type: string }
              verificationStatus: { type: string }
        timeline:
          type: array
          items:
            type: object
            properties:
              eventType: { type: string }
              actorType: { type: string }
              actorId: { type: string }
              action: { type: string }
              occurredAt: { type: string }
              resourceType: { type: string }
              resourceId: { type: string }
              evidenceHash: { type: string }
              verificationStatus: { type: string }
        warnings:
          type: array
          items: { type: string }
        generatedAt:
          type: string
          format: date-time

    AuditorReport:
      type: object
      required:
        - reportId
        - reportType
        - scope
        - generatedAt
        - findings
        - conclusion
        - provenanceSummary
        - grant
        - grantRequest
      properties:
        reportId:
          type: string
          format: uuid
        reportType:
          type: string
          enum: [auditor_report]
        scope:
          type: object
          required: [executionId]
          properties:
            executionId: { type: string }
            grantId: { type: string, nullable: true }
        generatedAt:
          type: string
          format: date-time
        findings:
          type: array
          items: { type: string }
        conclusion:
          type: string
          enum: [clean, attention_required]
        provenanceSummary:
          $ref: "#/components/schemas/DecisionProvenanceSummary"
        grant:
          type: object
          nullable: true
          properties:
            id: { type: string }
            subjectId: { type: string }
            role: { type: string }
            action: { type: string }
            resource: { type: string }
            validFrom: { type: string }
            validUntil: { type: string }
            createdBy: { type: string }
            reason: { type: string }
            createdAt: { type: string }
            revoked: { type: boolean }
            revokedBy: { type: string, nullable: true }
            revokedAt: { type: string, nullable: true }
            revokedReason: { type: string, nullable: true }
            signingKeyId: { type: string, nullable: true }
            payloadHash: { type: string, nullable: true }
            maxUses: { type: integer, nullable: true }
            useCount: { type: integer }
            signaturePresent: { type: boolean }
        grantRequest:
          type: object
          nullable: true
          properties:
            id: { type: string }
            subjectId: { type: string }
            role: { type: string }
            action: { type: string }
            resource: { type: string }
            validFrom: { type: string }
            validUntil: { type: string }
            requestedBy: { type: string }
            reason: { type: string }
            status: { type: string, enum: [requested, approved, denied, revoked, expired] }
            approvedBy: { type: string, nullable: true }
            approvedAt: { type: string, nullable: true }
            deniedBy: { type: string, nullable: true }
            deniedAt: { type: string, nullable: true }
            denialReason: { type: string, nullable: true }
            revokedBy: { type: string, nullable: true }
            revokedAt: { type: string, nullable: true }
            revokedReason: { type: string, nullable: true }
            grantId: { type: string, nullable: true }
            createdAt: { type: string }
            updatedAt: { type: string }
        evidenceBundle:
          type: object
          nullable: true

    EvidenceCompletenessReport:
      type: object
      required:
        - reportType
        - reportVersion
        - executionId
        - grantId
        - generatedAt
        - completenessScore
        - completenessStatus
        - missingEvidence
        - complianceGaps
        - warnings
        - auditReadiness
        - evidence
        - verification
        - provenance
      properties:
        reportType:
          type: string
          enum: [evidence_completeness]
        reportVersion:
          type: string
          enum: [gl-038-a1]
        executionId:
          type: string
        grantId:
          type: string
          nullable: true
        generatedAt:
          type: string
          format: date-time
        completenessScore:
          type: integer
          minimum: 0
          maximum: 100
        completenessStatus:
          type: string
          enum: [complete, incomplete, critical]
        missingEvidence:
          type: array
          items: { type: string }
        complianceGaps:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        auditReadiness:
          type: string
          enum: [ready, not_ready, blocked]
        evidence:
          type: object
          properties:
            present:
              type: boolean
            hash:
              type: string
              nullable: true
        verification:
          type: object
          properties:
            status:
              type: string
              nullable: true
            verifiedAt:
              type: string
              nullable: true
        provenance:
          type: object
          properties:
            eventCount:
              type: integer
            events:
              type: array
              nullable: true
              items:
                type: object
                properties:
                  eventType: { type: string }
                  actorType: { type: string }
                  actorId: { type: string }
                  action: { type: string }
                  occurredAt: { type: string }
        checks:
          type: object
          nullable: true
          properties:
            auditorReportAvailable:
              type: boolean
            executionPresent:
              type: boolean
            evidencePresent:
              type: boolean
            evidenceVerified:
              type: boolean
            evidenceValid:
              type: boolean
            provenanceEventsPresent:
              type: boolean
            criticalGapsPresent:
              type: boolean

    AgentPermissionProfile:
      type: object
      required:
        - profileName
        - description
        - scopes
        - scopeCount
        - warnings
      properties:
        profileName:
          type: string
          description: Normalized lowercase profile identifier.
        description:
          type: string
          description: Human-readable summary of the profile purpose.
        scopes:
          type: array
          items:
            type: string
          description: Deterministic list of scope strings granted by this profile.
        scopeCount:
          type: integer
          description: Number of scopes in the profile.
        warnings:
          type: array
          items:
            type: string
          description: Validation warnings (e.g. unknown or malformed scope entries).

    AgentPermissionAssignmentResolution:
      type: object
      required:
        - allowed
        - agentId
        - requestedScope
        - assignedScopes
        - assignedProfiles
        - resolvedScopes
        - matchedScope
        - resourceType
        - resourceId
        - reason
        - warnings
      properties:
        allowed:
          type: boolean
          description: Whether the requested scope is authorized.
        agentId:
          type: string
        requestedScope:
          type: string
        assignedScopes:
          type: array
          items:
            type: string
          description: Echo of the directly assigned scopes.
        assignedProfiles:
          type: array
          items:
            type: string
          description: Echo of the assigned profile names.
        resolvedScopes:
          type: array
          items:
            type: string
          description: Effective scopes after combining direct scopes and profile-derived scopes, deduplicated and sorted.
        matchedScope:
          type: string
          nullable: true
          description: The scope that granted access, or null if denied.
        resourceType:
          type: string
          nullable: true
        resourceId:
          type: string
          nullable: true
        reason:
          type: string
          description: Human-readable reason for allow/deny decision.
        warnings:
          type: array
          items:
            type: string
          description: Warnings about malformed inputs or unknown profiles.
        profileResolution:
          type: object
          nullable: true
          description: Detail object present only when `includeDetails=true`.
          properties:
            resolvedProfiles:
              type: array
              items:
                type: string
            unresolvedProfiles:
              type: array
              items:
                type: string
            warnings:
              type: array
              items:
                type: string
        evaluation:
          type: object
          nullable: true
          description: Full permission evaluation detail present only when `includeDetails=true`.
          properties:
            allowed:
              type: boolean
            agentId:
              type: string
            requestedScope:
              type: string
            matchedScope:
              type: string
              nullable: true
            resourceType:
              type: string
              nullable: true
            resourceId:
              type: string
              nullable: true
            reason:
              type: string
            warnings:
              type: array
              items:
                type: string

    ComplianceGapReport:
      type: object
      required:
        - reportType
        - reportVersion
        - executionId
        - grantId
        - generatedAt
        - overallStatus
        - severity
        - complianceGaps
        - blockingGaps
        - recommendedActions
        - completeness
        - evidence
