services:
  # ── Production-like stack (SQLite default) ────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grantlayer-api
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      - GRANTLAYER_HOST=0.0.0.0
      - GRANTLAYER_PORT=8765
      - GRANTLAYER_ADMIN_TOKEN=${GRANTLAYER_ADMIN_TOKEN:-}
      - GRANTLAYER_DB=/app/data/grantlayer.db
    volumes:
      - grantlayer-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── PostgreSQL backend (opt-in) ───────────────────────────────
  # To use PostgreSQL instead of SQLite:
  #   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
  #
  # Or set COMPOSE_FILE=docker-compose.yml:docker-compose.postgres.yml

volumes:
  grantlayer-data:
