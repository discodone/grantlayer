# GrantLayer full-stack compose (FastAPI + PostgreSQL + Redis + Nginx/TLS)
# Requires Docker Compose v2.24+ (uses the long env_file syntax).
#
# Quick start (PostgreSQL + Redis default):
#   1. cp .env.example .env       # local-eval defaults work as-is
#   2. ./nginx/generate-certs.sh
#   3. docker compose up -d db
#      docker compose run --rm api python3 -m alembic -c backend/alembic.ini upgrade head
#   4. docker compose up -d
#   5. curl -k https://localhost/health
#
# Defaults target LOCAL EVALUATION (GRANTLAYER_RUNTIME_MODE=local). For a
# production-like deployment set GRANTLAYER_RUNTIME_MODE=production in .env
# and complete the hardening checklist in DEPLOYMENT.md — every variable set
# in .env is forwarded into the containers via env_file.
#
# The Cardano anchoring worker is optional and profile-gated; the default
# stack starts without it and without any secrets files:
#   docker compose --profile anchoring up -d    # see secrets/README.md first
#
# Local SQLite-only development (no PostgreSQL, no Redis):
#   docker compose -f docker-compose.dev.yml up -d

services:
  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: grantlayer-api
    ports:
      - "8765:8765"
    # Every variable set in .env reaches the container — no whitelist to fall
    # out of sync with backend/src/core/config.py. The explicit environment
    # entries below take precedence and wire in-network service defaults.
    env_file:
      - path: ./.env
        required: false
    environment:
      # Override with .env file for local development
      # local = evaluation quickstart (auto-generated plaintext dev signing
      # key allowed). Set production in .env for the production gates
      # (strong admin token, Redis, unsubscribe secret — see DEPLOYMENT.md).
      - GRANTLAYER_RUNTIME_MODE=${GRANTLAYER_RUNTIME_MODE:-local}
      - GRANTLAYER_HOST=0.0.0.0
      - GRANTLAYER_PORT=8765
      - GRANTLAYER_ADMIN_TOKEN=${GRANTLAYER_ADMIN_TOKEN:-}
      - GRANTLAYER_REQUIRE_ADMIN_TOKEN=${GRANTLAYER_REQUIRE_ADMIN_TOKEN:-true}
      - GRANTLAYER_JWT_PRIVATE_KEY=${GRANTLAYER_JWT_PRIVATE_KEY:-}
      - GRANTLAYER_JWT_PUBLIC_KEY=${GRANTLAYER_JWT_PUBLIC_KEY:-}
      - GRANTLAYER_JWT_SECRET=${GRANTLAYER_JWT_SECRET:-}
      # PostgreSQL is the default backend.
      - GRANTLAYER_DATABASE_URL=${GRANTLAYER_DATABASE_URL:-postgresql://${GRANTLAYER_POSTGRES_USER:-grantlayer}:${GRANTLAYER_POSTGRES_PASSWORD:-changeme_in_env}@db:5432/${GRANTLAYER_POSTGRES_DB:-grantlayer}}
      - GRANTLAYER_DB=${GRANTLAYER_DB:-/app/data/grantlayer.db}
      # Redis is required for distributed rate limiting in production mode.
      - GRANTLAYER_REDIS_URL=${GRANTLAYER_REDIS_URL:-redis://redis:6379}
      - GRANTLAYER_LOG_LEVEL=${GRANTLAYER_LOG_LEVEL:-INFO}
      - GRANTLAYER_ENABLE_OPERATOR_MODEL=${GRANTLAYER_ENABLE_OPERATOR_MODEL:-true}
      - GRANTLAYER_ENABLE_DEMO_ENDPOINTS=${GRANTLAYER_ENABLE_DEMO_ENDPOINTS:-false}
    volumes:
      - grantlayer-data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - grantlayer

  # ── ARQ worker (background jobs + daily Cardano anchor cron) ──
  # Same image/env as `api`, but runs the ARQ worker instead of the HTTP server.
  # PROFILE-GATED: not started by a plain `docker compose up`. Enable with
  #   docker compose --profile anchoring up -d
  # after creating the two secrets files described in secrets/README.md
  # (Docker refuses to start the service while they are missing). The anchor
  # cron additionally self-gates at entry (fail-closed), so it stays dormant
  # unless GRANTLAYER_ENABLE_CARDANO_ANCHORING=true AND both secrets are set.
  worker:
    profiles: ["anchoring"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: grantlayer-worker
    command: ["arq", "backend.src.workers.worker.WorkerSettings"]
    env_file:
      - path: ./.env
        required: false
    environment:
      # Cloned from the api service so DB/Redis/JWT resolution is identical.
      - GRANTLAYER_RUNTIME_MODE=${GRANTLAYER_RUNTIME_MODE:-local}
      - GRANTLAYER_HOST=0.0.0.0
      - GRANTLAYER_PORT=8765
      - GRANTLAYER_ADMIN_TOKEN=${GRANTLAYER_ADMIN_TOKEN:-}
      - GRANTLAYER_REQUIRE_ADMIN_TOKEN=${GRANTLAYER_REQUIRE_ADMIN_TOKEN:-true}
      - GRANTLAYER_JWT_PRIVATE_KEY=${GRANTLAYER_JWT_PRIVATE_KEY:-}
      - GRANTLAYER_JWT_PUBLIC_KEY=${GRANTLAYER_JWT_PUBLIC_KEY:-}
      - GRANTLAYER_JWT_SECRET=${GRANTLAYER_JWT_SECRET:-}
      - GRANTLAYER_DATABASE_URL=${GRANTLAYER_DATABASE_URL:-postgresql://${GRANTLAYER_POSTGRES_USER:-grantlayer}:${GRANTLAYER_POSTGRES_PASSWORD:-changeme_in_env}@db:5432/${GRANTLAYER_POSTGRES_DB:-grantlayer}}
      - GRANTLAYER_DB=${GRANTLAYER_DB:-/app/data/grantlayer.db}
      - GRANTLAYER_REDIS_URL=${GRANTLAYER_REDIS_URL:-redis://redis:6379}
      - GRANTLAYER_LOG_LEVEL=${GRANTLAYER_LOG_LEVEL:-INFO}
      - GRANTLAYER_ENABLE_OPERATOR_MODEL=${GRANTLAYER_ENABLE_OPERATOR_MODEL:-true}
      - GRANTLAYER_ENABLE_DEMO_ENDPOINTS=${GRANTLAYER_ENABLE_DEMO_ENDPOINTS:-false}
      # Cardano anchoring (opt-in, fail-closed). Non-secret knobs; the cron is
      # registered at boot from these and self-gates at runtime.
      - GRANTLAYER_ENABLE_CARDANO_ANCHORING=${GRANTLAYER_ENABLE_CARDANO_ANCHORING:-false}
      - GRANTLAYER_CARDANO_NETWORK=${GRANTLAYER_CARDANO_NETWORK:-preprod}
      - GRANTLAYER_CARDANO_ANCHOR_WORKSPACE_ID=${GRANTLAYER_CARDANO_ANCHOR_WORKSPACE_ID:-}
      - GRANTLAYER_CARDANO_ANCHOR_CRON_HOUR=${GRANTLAYER_CARDANO_ANCHOR_CRON_HOUR:-2}
      - GRANTLAYER_CARDANO_ANCHOR_CRON_MINUTE=${GRANTLAYER_CARDANO_ANCHOR_CRON_MINUTE:-0}
      # pycardano 0.19.2 must use the cbor2 C backend, not the pure-Python fallback.
      - CBOR_C_EXTENSION=1
    secrets:
      - GRANTLAYER_BLOCKFROST_PROJECT_ID
      - GRANTLAYER_CARDANO_SIGNING_KEY
    volumes:
      - grantlayer-data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - grantlayer

  # ── Nginx TLS reverse proxy ───────────────────────────────────
  # Requires certs in nginx/certs/ — run ./nginx/generate-certs.sh first.
  nginx:
    image: nginx:1.27-alpine
    container_name: grantlayer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || true"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - grantlayer

  # ── PostgreSQL (default backend) ─────────────────────────────
  # Always starts with docker compose up.
  # To use SQLite instead, set GRANTLAYER_DATABASE_URL="" in your .env.
  db:
    image: postgres:16-alpine
    container_name: grantlayer-postgres
    environment:
      - POSTGRES_USER=${GRANTLAYER_POSTGRES_USER:-grantlayer}
      - POSTGRES_PASSWORD=${GRANTLAYER_POSTGRES_PASSWORD:-changeme_in_env}
      - POSTGRES_DB=${GRANTLAYER_POSTGRES_DB:-grantlayer}
    volumes:
      - grantlayer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${GRANTLAYER_POSTGRES_USER:-grantlayer} -d ${GRANTLAYER_POSTGRES_DB:-grantlayer}"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - grantlayer

  # ── Redis (rate limiting + ARQ job queue) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grantlayer-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - grantlayer

  # ── OPA sidecar (optional — enables policy engine) ─────────────
  # Set GRANTLAYER_OPA_URL=http://opa:8181 to activate policy evaluation in the API.
  opa:
    image: openpolicyagent/opa:latest
    container_name: grantlayer-opa
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    volumes:
      - ./opa/policies:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - grantlayer

volumes:
  grantlayer-data:
  grantlayer-postgres-data:

# Docker secrets mounted at /run/secrets/<NAME>; resolved by the SecretResolver
# file source (Vault > /run/secrets file > env). Empty files = fail-closed skip.
# Only referenced by the profile-gated `worker` service — the default stack
# starts without these files existing. Create them (see secrets/README.md)
# before running `docker compose --profile anchoring up -d`.
secrets:
  GRANTLAYER_BLOCKFROST_PROJECT_ID:
    file: ./secrets/blockfrost_project_id
  GRANTLAYER_CARDANO_SIGNING_KEY:
    file: ./secrets/cardano_signing_key

networks:
  grantlayer:
    driver: bridge
