# GrantLayer full-stack compose (FastAPI + PostgreSQL + Nginx/TLS)
#
# Quick start (PostgreSQL default):
#   1. cp .env.example .env && edit .env   # set GRANTLAYER_JWT_SECRET and passwords
#   2. ./nginx/generate-certs.sh
#   3. docker compose up -d
#   4. curl -k https://localhost/health
#
# SQLite-only (override DATABASE_URL in .env, or omit it and set GRANTLAYER_DB):
#   GRANTLAYER_DATABASE_URL="" docker compose up -d api

services:
  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: grantlayer-api
    ports:
      - "8765:8765"
    environment:
      # Override with .env file for local development
      - GRANTLAYER_RUNTIME_MODE=${GRANTLAYER_RUNTIME_MODE:-production}
      - GRANTLAYER_HOST=0.0.0.0
      - GRANTLAYER_PORT=8765
      - GRANTLAYER_ADMIN_TOKEN=${GRANTLAYER_ADMIN_TOKEN:-}
      - GRANTLAYER_REQUIRE_ADMIN_TOKEN=${GRANTLAYER_REQUIRE_ADMIN_TOKEN:-true}
      - GRANTLAYER_JWT_PRIVATE_KEY=${GRANTLAYER_JWT_PRIVATE_KEY:-}
      - GRANTLAYER_JWT_PUBLIC_KEY=${GRANTLAYER_JWT_PUBLIC_KEY:-}
      - GRANTLAYER_JWT_SECRET=${GRANTLAYER_JWT_SECRET:-}
      # PostgreSQL is the default backend. Override GRANTLAYER_DATABASE_URL="" in .env to use SQLite.
      - GRANTLAYER_DATABASE_URL=${GRANTLAYER_DATABASE_URL:-postgresql://${GRANTLAYER_POSTGRES_USER:-grantlayer}:${GRANTLAYER_POSTGRES_PASSWORD:-changeme_in_env}@db:5432/${GRANTLAYER_POSTGRES_DB:-grantlayer}}
      - GRANTLAYER_DB=${GRANTLAYER_DB:-/app/data/grantlayer.db}
      - GRANTLAYER_LOG_LEVEL=${GRANTLAYER_LOG_LEVEL:-INFO}
      - GRANTLAYER_ENABLE_OPERATOR_MODEL=${GRANTLAYER_ENABLE_OPERATOR_MODEL:-true}
      - GRANTLAYER_ENABLE_DEMO_ENDPOINTS=${GRANTLAYER_ENABLE_DEMO_ENDPOINTS:-false}
    volumes:
      - grantlayer-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - grantlayer

  # ── Nginx TLS reverse proxy ───────────────────────────────────
  # Requires certs in nginx/certs/ — run ./nginx/generate-certs.sh first.
  nginx:
    image: nginx:1.27-alpine
    container_name: grantlayer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || true"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - grantlayer

  # ── PostgreSQL (default backend) ─────────────────────────────
  # Always starts with docker compose up.
  # To use SQLite instead, set GRANTLAYER_DATABASE_URL="" in your .env.
  db:
    image: postgres:16-alpine
    container_name: grantlayer-postgres
    environment:
      - POSTGRES_USER=${GRANTLAYER_POSTGRES_USER:-grantlayer}
      - POSTGRES_PASSWORD=${GRANTLAYER_POSTGRES_PASSWORD:-changeme_in_env}
      - POSTGRES_DB=${GRANTLAYER_POSTGRES_DB:-grantlayer}
    volumes:
      - grantlayer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${GRANTLAYER_POSTGRES_USER:-grantlayer} -d ${GRANTLAYER_POSTGRES_DB:-grantlayer}"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - grantlayer

  # ── OPA sidecar (optional — enables policy engine) ─────────────
  # Set GRANTLAYER_OPA_URL=http://opa:8181 to activate policy evaluation in the API.
  opa:
    image: openpolicyagent/opa:latest
    container_name: grantlayer-opa
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    volumes:
      - ./opa/policies:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - grantlayer

volumes:
  grantlayer-data:
  grantlayer-postgres-data:

networks:
  grantlayer:
    driver: bridge
