[tool.ruff]
line-length = 100
exclude = [
    "backend/tests/",
    "migrations_alembic/",
    "sdk/",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501", "E402"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = [
    "backend/tests/",
    "migrations_alembic/",
    "sdk/",
]
