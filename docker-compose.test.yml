# GrantLayer MVP — local PostgreSQL integration test stack
#
# Spins up a throw-away PostgreSQL 16 instance and runs the full functional
# test suite against it, mirroring the postgresql-integration CI job.
#
# Usage (from repo root):
#   docker compose -f docker-compose.test.yml run --rm test
#
# Or just start/stop the DB for manual test runs:
#   docker compose -f docker-compose.test.yml up -d postgres
#   GRANTLAYER_DATABASE_URL=postgresql://grantlayer:grantlayer_test@localhost:5433/grantlayer \
#     pytest backend/tests/ -x -q --tb=short -m "not doc_guard" --timeout 300
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: grantlayer-test-postgres
    environment:
      POSTGRES_USER: grantlayer
      # Local test-only credential — never used in production.
      POSTGRES_PASSWORD: grantlayer_test
      POSTGRES_DB: grantlayer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grantlayer -d grantlayer"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  test:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      # Local test-only credential — never used in production.
      GRANTLAYER_DATABASE_URL: postgresql://grantlayer:grantlayer_test@postgres:5432/grantlayer
      GRANTLAYER_RUNTIME_MODE: test
      GRANTLAYER_ALLOW_PLAINTEXT_PRIVATE_KEY_FILE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        pip install -q -r requirements.txt -r backend/requirements-dev.txt pytest-timeout &&
        python3 -c '
      import sys; sys.path.insert(0, \"backend\")
      from backend.src.core.db import init_db
      init_db()
      print(\"Schema initialised.\")
        ' &&
        python3 -m pytest backend/tests/ -x -q --tb=short
          -m 'not doc_guard'
          --timeout 300
          --ignore=backend/tests/test_gl112_audit_log_duplication_cleanup.py
          --ignore=backend/tests/test_gl139_audit_hash_chain_write_lock.py
          --ignore=backend/tests/test_gl141_operator_model_default.py
          --ignore=backend/tests/test_gl214_production_iam_operator_control_completion.py
          --ignore=backend/tests/test_gl203b_openapi_api_contract_cleanup.py
      "
