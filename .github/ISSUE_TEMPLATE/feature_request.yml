name: Feature request
description: Suggest a scoped developer-preview improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Developer Preview — GrantLayer is not production SaaS. Tenant isolation is not implemented.**

        Feature requests that assume production-grade multi-tenancy, live customer data, or deployed SaaS will be out of scope at this stage.
        Please read [CONTRIBUTING.md](../../CONTRIBUTING.md) before filing.

        **Do not include real secrets, real customer data, or private personal data in this request.**

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain or limitation does this request address?
      placeholder: "As a developer integrating GrantLayer, I find it difficult to … because …"
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: "Add a … endpoint / example / doc that …"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered or tried?
      placeholder: "I tried … but it doesn't work because …"
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How broad is the proposed change?
      options:
        - Small — single file or doc tweak
        - Medium — new example, test, or doc section
        - Large — new API surface, protocol change, or architecture change
        - Unknown
    validations:
      required: true

  - type: checkboxes
    id: affected_areas
    attributes:
      label: Affected areas
      description: Which areas of the project would this touch? (select all that apply)
      options:
        - label: Auth / Token
        - label: Grant lifecycle
        - label: Audit log
        - label: SDK (Python client)
        - label: Agent examples / coding-agent workflow
        - label: Documentation / quickstart
        - label: CI / test infrastructure
        - label: Other

  - type: textarea
    id: risks
    attributes:
      label: Risks / concerns
      description: Are there any compatibility, security, or scope risks you see?
      placeholder: "This might affect … if …"
    validations:
      required: false

  - type: textarea
    id: validation_expectations
    attributes:
      label: Validation expectations
      description: How would you know this feature is working correctly?
      placeholder: "A test that … / Running the agent example and seeing …"
    validations:
      required: false

  - type: textarea
    id: public_readiness_caveats
    attributes:
      label: Public-readiness caveats
      description: |
        Note any assumptions about production readiness, tenant isolation, or public deployment.
        GrantLayer is a developer preview. Do not assume production SaaS readiness or tenant isolation is implemented.
      placeholder: "This request assumes developer-preview scope only — not production deployment."
    validations:
      required: false

  - type: checkboxes
    id: safety_checklist
    attributes:
      label: Safety checklist
      options:
        - label: I did not include real secrets.
          required: true
        - label: I did not include real customer data.
          required: true
        - label: I did not include private personal data.
          required: true
        - label: I understand GrantLayer is not production SaaS.
          required: true
        - label: I understand tenant isolation is not implemented.
          required: true
