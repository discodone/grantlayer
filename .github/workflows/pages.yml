name: Deploy site to GitHub Pages

# Publishes the static marketing/verify site under site/ to GitHub Pages.
# No build step — site/ is served as-is (same content Netlify published).
# Requires the repo's Pages source to be set to "GitHub Actions" (Settings →
# Pages), which is a one-time admin action in the web UI.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least privilege: read the repo, write the Pages deployment via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deployment at a time; do not cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
