name: PostgreSQL CI

on:
  push:
    branches: [main, 'feature/**', 'gl-**']
  pull_request:
    branches: [main]

jobs:
  sqlite-unit-tests:
    runs-on: ubuntu-latest
    name: SQLite Unit Tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements-dev.txt ruff mypy

      - name: Lint (ruff)
        run: ruff check backend/src/

      - name: Type check (mypy)
        run: python3 -m mypy backend/src/

      - name: Run functional tests with coverage (SQLite, excludes doc-guard/scope-guard)
        env:
          GRANTLAYER_RUNTIME_MODE: test
          GRANTLAYER_ALLOW_PLAINTEXT_PRIVATE_KEY_FILE: "true"
        run: |
          python3 -m pytest backend/tests/ -m "not doc_guard and not performance" \
            --ignore=backend/tests/test_gl112_audit_log_duplication_cleanup.py \
            --ignore=backend/tests/test_gl139_audit_hash_chain_write_lock.py \
            --ignore=backend/tests/test_gl141_operator_model_default.py \
            --ignore=backend/tests/test_gl214_production_iam_operator_control_completion.py \
            --ignore=backend/tests/test_gl203b_openapi_api_contract_cleanup.py \
            --cov=backend/src --cov-report=term-missing --cov-fail-under=60 \
            -x --tb=short

  postgres-integration:
    runs-on: ubuntu-latest
    name: PostgreSQL 16 Integration Tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Ephemeral CI-only test database credential; not a production secret.
          POSTGRES_USER: grantlayer
          POSTGRES_PASSWORD: grantlayer_test_password
          POSTGRES_DB: grantlayer
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements-dev.txt

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U grantlayer && break
            sleep 1
          done

      - name: Initialise schema
        env:
          # Ephemeral CI-only test database credential; not a production secret.
          DATABASE_URL: postgresql://grantlayer:grantlayer_test_password@localhost:5432/grantlayer
          GRANTLAYER_DATABASE_URL: postgresql://grantlayer:grantlayer_test_password@localhost:5432/grantlayer
          GRANTLAYER_RUNTIME_MODE: test
          GRANTLAYER_ALLOW_PLAINTEXT_PRIVATE_KEY_FILE: "true"
        run: |
          # Provision via Alembic — the authoritative production path. The
          # file-based runner is frozen dev/test-only and refuses to run against
          # PostgreSQL, so init_db() no longer provisions Postgres; the test's
          # setUp calls init_db(), which now detects the Alembic-owned schema and
          # defers to it. Provisioning here is what makes that deferral work.
          python3 -m alembic -c backend/alembic.ini upgrade head
          echo "Schema initialised via Alembic."

      - name: Run PostgreSQL integration tests
        env:
          # Ephemeral CI-only test database credential; not a production secret.
          GRANTLAYER_DATABASE_URL: postgres://grantlayer:grantlayer_test_password@localhost:5432/grantlayer
          GRANTLAYER_RUNTIME_MODE: test
          GRANTLAYER_ALLOW_PLAINTEXT_PRIVATE_KEY_FILE: "true"
        run: |
          python3 -m unittest backend.tests.test_gl108_postgres_audit_immutability.TestGl116PostgresAuditImmutabilityIntegration -v

  postgresql-integration:
    runs-on: ubuntu-latest
    name: PostgreSQL 16 Full Suite
    needs: [sqlite-unit-tests]
    # GATING. Runs only PostgreSQL-relevant tests: the `sqlite_only` marker
    # excludes the ~139 modules that self-provision a private SQLite database
    # (reload db / repoint DB_PATH_OR_URL / GRANTLAYER_DB) and so can never
    # exercise PostgreSQL — running them here only handed a SQLite path to
    # psycopg2 (invalid dsn) and produced noise. With those partitioned out the
    # suite is DSN-clean and green. The earlier "parity divergences" (evidence-
    # export ArgumentError; workspace_id NotNullViolation) were harness-
    # contamination artifacts, not PostgreSQL product defects, and are gone on a
    # clean run. This job now gates merges alongside the SQLite Unit Tests job —
    # do NOT weaken it back to continue-on-error without restoring the partition
    # (the sqlite_only marker + the DSN-clean proof).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Ephemeral CI-only test database credential; not a production secret.
          POSTGRES_USER: grantlayer
          POSTGRES_PASSWORD: grantlayer_test_password
          POSTGRES_DB: grantlayer
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements-dev.txt pytest-timeout

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U grantlayer && break
            sleep 1
          done

      - name: Initialise schema
        env:
          # Ephemeral CI-only test database credential; not a production secret.
          DATABASE_URL: postgresql://grantlayer:grantlayer_test_password@localhost:5432/grantlayer
          GRANTLAYER_DATABASE_URL: postgresql://grantlayer:grantlayer_test_password@localhost:5432/grantlayer
          GRANTLAYER_RUNTIME_MODE: test
          GRANTLAYER_ALLOW_PLAINTEXT_PRIVATE_KEY_FILE: "true"
        run: |
          # Provision via Alembic — the authoritative production path. The
          # file-based runner is frozen dev/test-only (and does not cleanly
          # provision PostgreSQL), so CI exercises the real prod provisioning.
          python3 -m alembic -c backend/alembic.ini upgrade head
          echo "Schema initialised via Alembic."

      - name: Run full functional test suite (PostgreSQL)
        env:
          # Ephemeral CI-only test database credential; not a production secret.
          GRANTLAYER_DATABASE_URL: postgresql://grantlayer:grantlayer_test_password@localhost:5432/grantlayer
          GRANTLAYER_RUNTIME_MODE: test
          GRANTLAYER_ALLOW_PLAINTEXT_PRIVATE_KEY_FILE: "true"
        run: |
          python3 -m pytest backend/tests/ -x -q --tb=short \
            -m "not sqlite_only and not doc_guard and not scope_guard and not performance" \
            --timeout 300 \
            --ignore=backend/tests/test_gl112_audit_log_duplication_cleanup.py \
            --ignore=backend/tests/test_gl139_audit_hash_chain_write_lock.py \
            --ignore=backend/tests/test_gl141_operator_model_default.py \
            --ignore=backend/tests/test_gl214_production_iam_operator_control_completion.py \
            --ignore=backend/tests/test_gl203b_openapi_api_contract_cleanup.py \
            --ignore=backend/tests/test_gl230_docker_jwt_quickstart.py
