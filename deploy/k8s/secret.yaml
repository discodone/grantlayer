apiVersion: v1
kind: Secret
metadata:
  name: grantlayer-secrets
  namespace: grantlayer
type: Opaque
stringData:
  GRANTLAYER_DATABASE_URL: "postgresql://grantlayer:CHANGE_ME@postgres:5432/grantlayer"
  GRANTLAYER_REDIS_URL: "redis://redis:6379/0"
  GRANTLAYER_ADMIN_TOKEN: "CHANGE_ME_LONG_RANDOM_TOKEN"
  GRANTLAYER_JWT_SECRET: "CHANGE_ME_32_CHAR_MIN_SECRET"
