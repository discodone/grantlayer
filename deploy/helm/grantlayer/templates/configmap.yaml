apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grantlayer.fullname" . }}-config
  labels:
    {{- include "grantlayer.labels" . | nindent 4 }}
data:
  RUNTIME_MODE: {{ .Values.config.runtimeMode | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  GRANTLAYER_RATE_LIMIT_AUTH: {{ .Values.config.rateLimitAuth | quote }}
  GRANTLAYER_RATE_LIMIT_API: {{ .Values.config.rateLimitApi | quote }}
  ENABLE_DEMO_ENDPOINTS: {{ .Values.config.enableDemoEndpoints | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  GRANTLAYER_JWT_ALGORITHM: {{ .Values.config.jwtAlgorithm | quote }}
