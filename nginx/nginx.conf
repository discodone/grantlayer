# GL-230: Nginx reverse proxy with TLS termination.
# Local dev: self-signed cert generated by nginx/generate-certs.sh
# Production: replace nginx/certs/tls.crt + tls.key with a real cert (e.g. Let's Encrypt).

events {
    worker_connections 1024;
}

http {
    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS reverse proxy → FastAPI backend
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Content-Type-Options  nosniff                             always;
        add_header X-Frame-Options         DENY                                always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Proxy to the FastAPI backend container
        location / {
            proxy_pass         http://api:8765;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
