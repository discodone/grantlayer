[pytest]
testpaths = backend/tests
tmp_path_retention_policy = none
markers =
    doc_guard: Tests that verify documentation artifacts exist and contain expected content (not application logic).
    scope_guard: Tests that assert branch/diff scope constraints rather than application behavior.
    sqlite_only: Tests that self-provision a private SQLite DB (reload db / repoint DB_PATH_OR_URL / GRANTLAYER_DB) and so cannot run against the PostgreSQL Full Suite; excluded from the PG job, kept in the SQLite gate.
    performance: Performance benchmarking tests (excluded from normal test suite, run via make perf-test).
    contract: OpenAPI contract and schemathesis fuzz tests (run with make test-contract).
    no_db_truncate: Opt out of the autouse per-test PostgreSQL TRUNCATE fixture (for classes that seed shared data in setUpClass).
